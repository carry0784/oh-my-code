name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-ruff0.15.9
          restore-keys: ${{ runner.os }}-pip-lint-
      - run: python -m pip install --upgrade pip
      - run: python -m pip install ruff==0.15.9
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt aiosqlite
      - run: python -m pip install -e .
      - run: pytest --cov=app --cov-report=term-missing --cov-fail-under=65 -q

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-typecheck-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-typecheck-
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt mypy
      - run: >-
          mypy
          app/services/data_provider.py
          app/services/strategy_genome.py
          app/services/system_health.py
          app/services/strategy_runner.py
          app/services/screening_transform.py
          app/services/strategy_tournament.py
          app/services/sector_rotator.py
          app/services/sentiment_collector.py
          app/services/screening_qualification_pipeline.py
          app/services/strategy_lifecycle.py
          app/services/walk_forward_validator.py
          app/services/strategy_registry.py
          app/services/trend_observation_service.py
          --ignore-missing-imports
          --disallow-untyped-defs
          --disallow-incomplete-defs
          --follow-imports=skip
          --no-error-summary

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5.0.0
      - uses: actions/setup-python@v6.0.0
        with:
          python-version: "3.11"
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-build-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-build-
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -c "import kdexter; print(kdexter.__version__)"
